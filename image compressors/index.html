<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI 7 Image Compressor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@1.0.15/dist/browser-image-compression.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        .drop-zone { transition: all 0.3s; }
        .drop-zone.dragover { background-color: #dbeafe; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div class="max-w-4xl mx-auto px-4">
        
        <!-- Header -->
        <div class="bg-blue-700 text-white p-4 rounded-t-2xl flex items-center gap-3">
            <div class="bg-white text-blue-700 font-bold px-3 py-1 rounded">MI 7</div>
            <h1 class="text-2xl font-bold">IMAGE COMPRESSOR</h1>
        </div>

        <div class="bg-white rounded-b-2xl shadow-xl p-8">

            <!-- AD 1 - Top -->
            <div class="my-4 flex justify-center">
                <script>
                  atOptions = {
                    'key' : 'a19e78af82bfc5042a04e93d687db473',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                  };
                </script>
                <script src="https://www.highperformanceformat.com/a19e78af82bfc5042a04e93d687db473/invoke.js"></script>
            </div>

            <h2 class="text-3xl font-bold text-center mb-2">MI 7 Image Compressor</h2>
            <p class="text-center text-gray-600 mb-6">Compress images to your desired size</p>

            <!-- Size Control -->
            <div class="bg-blue-50 border border-blue-200 rounded-2xl p-6 mb-8">
                <div class="flex items-center gap-4 justify-center">
                    <label class="font-medium">Target Size:</label>
                    <input type="number" id="target-size" value="50" 
                           class="w-28 px-4 py-3 border rounded-xl text-center text-lg font-semibold">
                    <span class="font-medium">KB</span>
                </div>
                <p class="text-center text-sm text-blue-600 mt-3">
                    ✅ Choose any size (50KB, 100KB, 200KB etc.) - Image will be compressed close to your selected size
                </p>
            </div>

            <!-- Drop Zone -->
            <div id="drop-zone" class="drop-zone border-4 border-dashed border-blue-300 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-500">
                <p class="text-xl text-gray-700 mb-4">Select Or Drag & Drop Images Here</p>
                <button onclick="document.getElementById('file-input').click()" 
                        class="px-8 py-4 bg-green-600 text-white rounded-xl hover:bg-green-700 font-semibold">
                    Select Images
                </button>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
            </div>

            <!-- AD 2 - Middle -->
            <div class="my-8 flex justify-center">
                <script>
                  atOptions = {
                    'key' : 'a19e78af82bfc5042a04e93d687db473',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                  };
                </script>
                <script src="https://www.highperformanceformat.com/a19e78af82bfc5042a04e93d687db473/invoke.js"></script>
            </div>

            <!-- Files List -->
            <div id="files-list" class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6"></div>

            <div class="mt-8 text-center">
                <button onclick="compressAll()" id="compress-btn" 
                        class="hidden px-10 py-4 bg-blue-600 text-white rounded-2xl font-semibold hover:bg-blue-700">
                    Compress Images
                </button>
            </div>

            <!-- AD 3 - Bottom -->
            <div class="my-8 flex justify-center">
                <script>
                  atOptions = {
                    'key' : 'a19e78af82bfc5042a04e93d687db473',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                  };
                </script>
                <script src="https://www.highperformanceformat.com/a19e78af82bfc5042a04e93d687db473/invoke.js"></script>
            </div>

            <div class="text-center">
                <button onclick="downloadAllAsZip()" id="zip-btn" 
                        class="hidden px-8 py-4 bg-purple-600 text-white rounded-2xl font-semibold hover:bg-purple-700">
                    Download All as ZIP
                </button>
            </div>
        </div>
    </div>

    <script>
        let filesData = [];

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const filesList = document.getElementById('files-list');
        const compressBtn = document.getElementById('compress-btn');
        const zipBtn = document.getElementById('zip-btn');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => { 
            e.preventDefault(); 
            dropZone.classList.remove('dragover'); 
            handleFiles(e.dataTransfer.files); 
        });

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            for (let file of files) {
                if (!file.type.startsWith('image/')) continue;
                const reader = new FileReader();
                reader.onload = function(e) {
                    filesData.push({
                        file: file,
                        originalSize: (file.size / 1024).toFixed(2),
                        preview: e.target.result,
                        compressedFile: null,
                        compressedSize: null
                    });
                    renderFiles();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderFiles() {
            filesList.innerHTML = '';
            const hasFiles = filesData.length > 0;
            compressBtn.classList.toggle('hidden', !hasFiles);
            zipBtn.classList.toggle('hidden', !hasFiles);

            filesData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-gray-50 border rounded-2xl p-6";
                div.innerHTML = `
                    <div class="flex gap-6">
                        <img src="${item.preview}" class="w-36 h-36 object-cover rounded-xl">
                        <div class="flex-1">
                            <p class="font-medium">${item.file.name}</p>
                            <p class="text-sm text-gray-500">Original: ${item.originalSize} KB</p>
                            ${item.compressedSize ? `<p class="text-green-600 font-medium">Compressed: ${item.compressedSize} KB</p>` : ''}
                            ${item.compressedFile ? `<button onclick="downloadSingle(${index})" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg">Download</button>` : ''}
                        </div>
                    </div>
                `;
                filesList.appendChild(div);
            });
        }

        async function compressAll() {
            const targetKB = parseFloat(document.getElementById('target-size').value) || 50;
            compressBtn.textContent = "Compressing...";
            compressBtn.disabled = true;

            for (let i = 0; i < filesData.length; i++) {
                const item = filesData[i];
                let quality = 0.8;
                let compressed;

                // Try to reach target size more accurately
                for (let attempt = 0; attempt < 5; attempt++) {
                    const options = {
                        maxSizeMB: targetKB / 1024 + 0.1,
                        maxWidthOrHeight: 1920,
                        useWebWorker: true,
                        quality: quality
                    };
                    compressed = await imageCompression(item.file, options);
                    
                    if ((compressed.size / 1024) <= targetKB * 1.1) break;
                    quality -= 0.15;
                    if (quality < 0.3) break;
                }

                item.compressedFile = compressed;
                item.compressedSize = (compressed.size / 1024).toFixed(2);
            }
            
            renderFiles();
            compressBtn.textContent = "Compress Again";
            compressBtn.disabled = false;
        }

        function downloadSingle(index) {
            const item = filesData[index];
            if (!item.compressedFile) return;
            const url = URL.createObjectURL(item.compressedFile);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'compressed-' + item.file.name;
            a.click();
        }

        async function downloadAllAsZip() {
            const zip = new JSZip();
            for (let item of filesData) {
                if (item.compressedFile) zip.file('compressed-' + item.file.name, item.compressedFile);
            }
            const content = await zip.generateAsync({type: "blob"});
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = "compressed-images.zip";
            a.click();
        }
    </script>
</body>
</html>
